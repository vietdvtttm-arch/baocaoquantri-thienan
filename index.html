/* KPI logic */
const statusOf=(v,g,b,d)=>!isFinite(v)?"ĐỎ":d==="high"?(v>=g?"XANH":v<=b?"ĐỎ":"VÀNG"):(v<=g?"XANH":v>=b?"ĐỎ":"VÀNG");
const scoreOf=(v,g,b,d)=>{if(!isFinite(v))return 0;let s=d==="high"?(v-b)/(g-b)*100:(b-v)/(b-g)*100;return Math.max(0,Math.min(100,s));};
const fmtVal=(v,f)=>{if(!isFinite(v))return"—";if(f==="pct")return v.toFixed(1)+"%";if(f==="x")return v.toFixed(2)+"×";if(f==="int")return Math.round(v).toLocaleString("vi-VN");return v.toFixed(1);};
const fmtN=v=>isFinite(v)?Math.round(v).toLocaleString("vi-VN"):"—";
const rollup=a=>a.includes("ĐỎ")?"ĐỎ":a.includes("VÀNG")?"VÀNG":"XANH";
function computeKpis(node,vals){const ext={...vals};if(node.derive)Object.assign(ext,node.derive(ext));return node.kpis.map(k=>{let v=k.calc(ext);if(!isFinite(v))v=0;return {...k,val:v,status:statusOf(v,k.good,k.bad,k.dir),score:scoreOf(v,k.good,k.bad,k.dir)};});}

/* storage (kho dùng chung -> bộ nhớ trình duyệt -> bộ nhớ tạm) */
const HAS_WS=typeof window!=="undefined"&&window.storage&&typeof window.storage.get==="function";
let HAS_LS=false; try{localStorage.setItem("__t","1");localStorage.removeItem("__t");HAS_LS=true;}catch(e){HAS_LS=false;}
const MEM=new Map();
async function sget(key){if(HAS_WS){try{const r=await window.storage.get(key,true);return r?r.value:null;}catch(e){return null;}}if(HAS_LS){try{return localStorage.getItem(key);}catch(e){}}return MEM.has(key)?MEM.get(key):null;}
async function sset(key,val){if(HAS_WS){try{await window.storage.set(key,val,true);return;}catch(e){}}if(HAS_LS){try{localStorage.setItem(key,val);return;}catch(e){}}MEM.set(key,val);}

/* excel */
const gcell=(row,cols,name)=>{const i=cols[name];return i==null?"":(row[i]==null?"":String(row[i]).trim());};
const normStatus=s=>{const t=String(s||"").trim();if(STATUSES.includes(t))return t;const lo=t.toLowerCase();for(const v of STATUSES)if(v.toLowerCase()===lo)return v;return t?"Đang thực hiện":"Chưa thực hiện";};
function extractTasks(ws){const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});let hr=-1,cols={};
 for(let i=0;i<rows.length;i++){const idx=rows[i].findIndex(c=>String(c).trim()==="Nội dung công việc");if(idx>=0){hr=i;rows[i].forEach((c,ci)=>{cols[String(c).trim()]=ci;});break;}}
 if(hr<0)return null;const out=[];
 for(let i=hr+1;i<rows.length;i++){const row=rows[i]||[];const nd=gcell(row,cols,"Nội dung công việc");if(!nd)continue;
  out.push({id:"x"+Date.now()+"_"+i+"_"+Math.floor(Math.random()*1000),noidung:nd,muctieu:gcell(row,cols,"Mục tiêu / Kết quả mong đợi"),phutrach:gcell(row,cols,"Người phụ trách"),phoihop:gcell(row,cols,"Phối hợp"),batdau:gcell(row,cols,"Bắt đầu"),han:gcell(row,cols,"Hạn hoàn thành"),trangthai:normStatus(gcell(row,cols,"Trạng thái")),pct:Number(gcell(row,cols,"% hoàn thành"))||0,ketqua:gcell(row,cols,"Kết quả thực hiện"),khokhan:gcell(row,cols,"Khó khăn / vướng mắc"),dexuat:gcell(row,cols,"Đề xuất / Kế hoạch tiếp theo")});}
 return out;}
function parseFile(buf){const wb=XLSX.read(new Uint8Array(buf),{type:"array"});const res={};wb.SheetNames.forEach(sn=>{const t=extractTasks(wb.Sheets[sn]);if(t&&t.length)res[sn]=t;});return res;}
function matchDept(sheetName){const s=sheetName.trim().toLowerCase();let d=DEPTS.find(x=>x.sheet.toLowerCase()===s);if(d)return d.code;d=DEPTS.find(x=>s.includes(x.sheet.toLowerCase())||x.short.toLowerCase().replace("–","-").includes(s));return d?d.code:null;}

function deptStats(tasks){const c={total:tasks.length};STATUSES.forEach(s=>c[s]=0);let sum=0,n=0;tasks.forEach(t=>{const st=STATUSES.includes(t.trangthai)?t.trangthai:"Chưa thực hiện";c[st]++;sum+=Number(t.pct)||0;n++;});c.pctAvg=n?sum/n:0;c.eval=c["Quá hạn"]>0?"Cần chú ý":(c.pctAvg>=80?"Tốt":(c.pctAvg>=50?"Bình thường":"Chậm"));return c;}

const IcTrash=<Icon size={15} d={<><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>}/>;

function TaskBadge({s}){const t=TASK_STA[s]||TASK_STA["Chưa thực hiện"];return <span style={{background:t.bg,color:t.c}} className="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[11px] font-semibold"><span style={{background:t.dot}} className="w-1.5 h-1.5 rounded-full"></span>{s}</span>;}
function EvalBadge({e}){const t=EVALC[e]||EVALC["Bình thường"];return <span style={{background:t.bg,color:t.c}} className="inline-flex items-center rounded-full px-2.5 py-0.5 text-[11px] font-bold">{e}</span>;}
function KBadge({s}){const t=KSTA[s];return <span style={{background:t.bg,color:t.c}} className="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[10px] font-semibold"><span style={{background:t.dot}} className="w-1.5 h-1.5 rounded-full"></span>{s}</span>;}
const Eyebrow=({children})=><div className="text-[11px] font-bold tracking-widest uppercase" style={{color:C.sub}}>{children}</div>;

function DonutG({data,size=170,thick=24,center,sub}){const tot=data.reduce((a,d)=>a+d.value,0)||1;let off=0;const R=size/2-thick/2-2,CX=size/2,CY=size/2;
 return(<svg viewBox={"0 0 "+size+" "+size} className="w-full" style={{maxHeight:size+6}}>
  <g transform={"rotate(-90 "+CX+" "+CY+")"}>{data.map((d,i)=>{const pct=d.value/tot*100;const el=(<circle key={i} cx={CX} cy={CY} r={R} fill="none" stroke={d.color} strokeWidth={thick} pathLength="100" strokeDasharray={pct+" "+(100-pct)} strokeDashoffset={-off}/>);off+=pct;return el;})}</g>
  <text x={CX} y={CY-2} textAnchor="middle" style={{fontSize:26,fontWeight:800,fill:C.navy,...MONO}}>{center!=null?center:tot}</text>
  <text x={CX} y={CY+16} textAnchor="middle" style={{fontSize:10,fill:C.sub}}>{sub||""}</text></svg>);}

function PctBar({v,color}){return <div className="h-2 rounded-full overflow-hidden" style={{background:"#eef2f7"}}><div style={{width:Math.max(0,Math.min(100,v))+"%",background:color||C.teal}} className="h-full transition-all"></div></div>;}

/* ---- Work plan editor (department) ---- */
function WorkPlanEditor({code,deptData,saveDept,toast,readOnly}){
 const dept=deptByCode(code);
 const src=(deptData[code]?deptData[code].tasks:[]);
 const sig=deptData[code]?deptData[code].updatedAt:0;
 const [rows,setRows]=useState(src.map(t=>({...t})));
 const [dirty,setDirty]=useState(false);
 useEffect(()=>{setRows((deptData[code]?deptData[code].tasks:[]).map(t=>({...t})));setDirty(false);},[code,sig]);
 const fileRef=useRef();
 const st=deptStats(rows);
 const upd=(i,k,v)=>{setRows(rs=>rs.map((r,j)=>j===i?{...r,[k]:v}:r));setDirty(true);};
 const add=()=>{setRows(rs=>[...rs,{id:"n"+Date.now(),noidung:"",muctieu:"",phutrach:"",phoihop:"",batdau:"",han:"",trangthai:"Chưa thực hiện",pct:0,ketqua:"",khokhan:"",dexuat:""}]);setDirty(true);};
 const del=i=>{setRows(rs=>rs.filter((_,j)=>j!==i));setDirty(true);};
 const save=async()=>{await saveDept(code,rows);setDirty(false);toast("Đã lưu công việc – "+dept.name);};
 const onFile=f=>{const rd=new FileReader();rd.onload=e=>{try{const res=parseFile(e.target.result);let picked=null;for(const sn in res){if(matchDept(sn)===code){picked=res[sn];break;}}if(!picked){const ks=Object.keys(res);if(ks.length===1)picked=res[ks[0]];}if(!picked){toast("Không thấy dữ liệu công việc của phòng trong file. Hãy dùng đúng biểu mẫu (sheet '"+dept.sheet+"').",true);return;}setRows(picked);setDirty(true);toast("Đã nhập "+picked.length+" công việc từ Excel — bấm 'Lưu' để cập nhật.");}catch(err){toast("Lỗi đọc Excel: "+err.message,true);}};rd.readAsArrayBuffer(f);};
 const donut=STATUSES.map(s=>({value:st[s],color:TASK_STA[s].dot}));
 return(<div className="space-y-4">
  <div className="flex flex-wrap items-center justify-between gap-3">
   <div><Eyebrow>Kế hoạch & Báo cáo công việc</Eyebrow><h2 className="text-lg font-bold" style={{color:C.navy}}>{dept.name}</h2></div>
   {!readOnly&&<div className="flex items-center gap-2">
    <button onClick={()=>fileRef.current.click()} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-md border px-2.5 py-1.5 bg-white hover:bg-slate-50" style={{borderColor:C.line}}>{IcUpload} Nhập Excel</button>
    <button onClick={add} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-md border px-2.5 py-1.5 bg-white hover:bg-slate-50" style={{borderColor:C.line}}>{IcPlus} Thêm việc</button>
    <button onClick={save} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-md px-3 py-1.5 text-white" style={{background:dirty?C.teal:"#94a3b8"}}>{IcSave} Lưu{dirty?" *":""}</button>
    <input ref={fileRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={e=>{if(e.target.files[0])onFile(e.target.files[0]);e.target.value="";}}/>
   </div>}
  </div>
  <div className="grid sm:grid-cols-4 lg:grid-cols-7 gap-2">
   <div className="bg-white rounded-xl border p-3" style={{borderColor:C.line}}><div className="text-[10px]" style={{color:C.sub}}>Tổng việc</div><div className="text-2xl font-extrabold" style={{color:C.navy,...MONO}}>{st.total}</div></div>
   {STATUSES.map(s=>(<div key={s} className="bg-white rounded-xl border p-3" style={{borderColor:C.line}}><div className="text-[10px] leading-tight" style={{color:C.sub}}>{s}</div><div className="text-2xl font-extrabold" style={{color:TASK_STA[s].c,...MONO}}>{st[s]}</div></div>))}
   <div className="bg-white rounded-xl border p-3" style={{borderColor:C.line}}><div className="text-[10px]" style={{color:C.sub}}>% hoàn thành TB</div><div className="text-2xl font-extrabold" style={{color:C.teal,...MONO}}>{st.pctAvg.toFixed(0)}%</div></div>
  </div>
  <div className="bg-white rounded-xl border overflow-hidden" style={{borderColor:C.line}}>
   <div className="overflow-x-auto"><table className="w-full text-sm" style={{minWidth:880}}>
    <thead><tr className="text-[11px] uppercase tracking-wide" style={{color:C.sub,background:"#f8fafc"}}>
     <th className="text-left font-semibold px-2 py-2 w-8">#</th>
     <th className="text-left font-semibold px-2 py-2" style={{minWidth:230}}>Nội dung công việc</th>
     <th className="text-left font-semibold px-2 py-2">Người phụ trách</th>
     <th className="text-left font-semibold px-2 py-2">Hạn</th>
     <th className="text-left font-semibold px-2 py-2">Trạng thái</th>
     <th className="text-left font-semibold px-2 py-2 w-16">%</th>
     <th className="text-left font-semibold px-2 py-2" style={{minWidth:180}}>Kết quả / Ghi chú</th>
     {!readOnly&&<th className="px-2 py-2 w-8"></th>}</tr></thead>
    <tbody>{rows.map((r,i)=>{const t=TASK_STA[r.trangthai]||TASK_STA["Chưa thực hiện"];
     return(<tr key={r.id||i} className="border-t align-top" style={{borderColor:C.line}}>
      <td className="px-2 py-1.5 text-center" style={{color:C.sub,...MONO}}>{i+1}</td>
      <td className="px-2 py-1.5">{readOnly?<span>{r.noidung}</span>:<input value={r.noidung} onChange={e=>upd(i,"noidung",e.target.value)} className="w-full border rounded px-1.5 py-1 text-[13px]" style={{borderColor:C.line}}/>}</td>
      <td className="px-2 py-1.5">{readOnly?<span>{r.phutrach}</span>:<input value={r.phutrach} onChange={e=>upd(i,"phutrach",e.target.value)} className="w-full border rounded px-1.5 py-1 text-[13px]" style={{borderColor:C.line}}/>}</td>
      <td className="px-2 py-1.5">{readOnly?<span>{r.han}</span>:<input value={r.han} onChange={e=>upd(i,"han",e.target.value)} className="w-24 border rounded px-1.5 py-1 text-[13px]" style={{borderColor:C.line}}/>}</td>
      <td className="px-2 py-1.5">{readOnly?<TaskBadge s={r.trangthai}/>:<select value={r.trangthai} onChange={e=>upd(i,"trangthai",e.target.value)} className="border rounded px-1 py-1 text-[12px] font-semibold" style={{borderColor:C.line,background:t.bg,color:t.c}}>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select>}</td>
      <td className="px-2 py-1.5">{readOnly?<span className="mono">{r.pct}%</span>:<input type="number" min="0" max="100" value={r.pct} onChange={e=>upd(i,"pct",Number(e.target.value)||0)} className="w-14 border rounded px-1.5 py-1 text-[13px] text-right" style={{borderColor:C.line,...MONO}}/>}<div className="mt-1"><PctBar v={r.pct} color={t.dot}/></div></td>
      <td className="px-2 py-1.5">{readOnly?<span>{r.ketqua}</span>:<input value={r.ketqua} onChange={e=>upd(i,"ketqua",e.target.value)} className="w-full border rounded px-1.5 py-1 text-[13px]" style={{borderColor:C.line}}/>}</td>
      {!readOnly&&<td className="px-2 py-1.5 text-center"><button onClick={()=>del(i)} style={{color:"#ef4444"}} title="Xóa">{IcTrash}</button></td>}
     </tr>);})}
     {rows.length===0&&<tr><td colSpan={readOnly?7:8} className="text-center py-6 text-sm" style={{color:C.sub}}>Chưa có công việc. {readOnly?"":"Bấm 'Thêm việc' hoặc 'Nhập Excel'."}</td></tr>}
    </tbody></table></div>
  </div>
  {deptData[code]&&deptData[code].updatedBy&&<div className="text-[11px]" style={{color:C.sub}}>Cập nhật gần nhất bởi: {deptData[code].updatedBy}</div>}
 </div>);}

/* ---- Company overview (admin) ---- */

 per.forEach(p=>{tot.total+=p.total;STATUSES.forEach(s=>tot[s]+=p[s]);psum+=p.pctAvg*p.total;pn+=p.total;});

 const donut=STATUSES.map(s=>({value:tot[s],color:TASK_STA[s].dot}));

   {[["Tổng công việc",tot.total,C.navy2],["Hoàn thành",tot["Hoàn thành"],TASK_STA["Hoàn thành"].c],["Đang thực hiện",tot["Đang thực hiện"],TASK_STA["Đang thực hiện"].c],["Quá hạn",tot["Quá hạn"],TASK_STA["Quá hạn"].c]].map((c,i)=>(

  </div>
  <div className="grid lg:grid-cols-5 gap-4">
   <div className="bg-white rounded-xl border p-4 lg:col-span-2" style={{borderColor:C.line}}>

    <div className="grid grid-cols-2 gap-1.5 mt-2 text-[11px]">{STATUSES.map(s=>(<span key={s} className="inline-flex items-center gap-1.5"><span style={{background:TASK_STA[s].dot}} className="w-2.5 h-2.5 rounded-full"></span>{s}: <b className="mono">{tot[s]}</b></span>))}</div>

     <th className="text-center font-semibold px-2 py-2">Chưa TH</th><th className="text-center font-semibold px-2 py-2">Quá hạn</th>
     <th className="text-center font-semibold px-2 py-2 w-28">% HT TB</th><th className="text-center font-semibold px-3 py-2">Đánh giá</th></tr></thead>
    <tbody>{per.map(p=>(<tr key={p.code} onClick={()=>go(p.code)} className="border-t cursor-pointer hover:bg-slate-50" style={{borderColor:C.line}}>
     <td className="px-4 py-2.5 font-semibold" style={{color:C.ink}}>{p.name}</td>
     <td className="px-2 py-2.5 text-center mono">{p.total}</td>
     <td className="px-2 py-2.5 text-center mono" style={{color:TASK_STA["Hoàn thành"].c}}>{p["Hoàn thành"]}</td>
     <td className="px-2 py-2.5 text-center mono" style={{color:TASK_STA["Đang thực hiện"].c}}>{p["Đang thực hiện"]}</td>
     <td className="px-2 py-2.5 text-center mono" style={{color:TASK_STA["Chưa thực hiện"].c}}>{p["Chưa thực hiện"]}</td>
     <td className="px-2 py-2.5 text-center mono font-bold" style={{color:TASK_STA["Quá hạn"].c}}>{p["Quá hạn"]}</td>
     <td className="px-2 py-2.5"><div className="flex items-center gap-2"><div className="flex-1"><PctBar v={p.pctAvg} color={EVALC[p.eval].c}/></div><span className="mono text-[11px]" style={{color:C.sub}}>{p.pctAvg.toFixed(0)}%</span></div></td>
     <td className="px-3 py-2.5 text-center"><EvalBadge e={p.eval}/></td></tr>))}</tbody></table></div>
  </div>
 </div>);}

/* ---- KPI module ---- */
function kpiAgg(kpiVals){let g=0,y=0,r=0;const per=KPIDEPTS.map(d=>{const ks=computeKpis(d,kpiVals[d.code]);const cD=ks.filter(k=>k.status==="ĐỎ").length,cY=ks.filter(k=>k.status==="VÀNG").length,cG=ks.filter(k=>k.status==="XANH").length;g+=cG;y+=cY;r+=cD;return{code:d.code,name:d.name,short:d.short,cD,cY,cG,overall:rollup(ks.map(k=>k.status)),score:ks.reduce((a,k)=>a+k.score,0)/ks.length};});return{g,y,r,per};}
function KpiCard({r}){const t=KSTA[r.status];return(<div className="bg-white rounded-xl border p-3" style={{borderColor:C.line}}>
 <div className="flex items-start justify-between gap-2"><span className="text-[12px] font-medium leading-tight" style={{color:C.ink}}>{r.label}</span><KBadge s={r.status}/></div>
 <div className="flex items-end justify-between mt-1.5"><div className="text-xl font-extrabold" style={{color:t.c,...MONO}}>{fmtVal(r.val,r.fmt)}</div><div className="text-[10px] text-right" style={{color:C.sub}}>🟢 {fmtVal(r.good,r.fmt)} · 🔴 {fmtVal(r.bad,r.fmt)}</div></div>
 <div className="mt-1.5"><PctBar v={r.score} color={t.dot}/></div></div>);}
function KpiDeptView({code,kpiVals,setKpi,editable}){const d=kpiDeptByCode(code);const vals=kpiVals[code];const res=computeKpis(d,vals);
 return(<div className="grid lg:grid-cols-5 gap-4">
  <div className="bg-white rounded-xl border p-4 lg:col-span-2" style={{borderColor:C.line}}>
   <Eyebrow>Số liệu KPI</Eyebrow><h3 className="font-bold mb-1" style={{color:C.navy}}>{d.name}</h3>
   <div className="divide-y" style={{borderColor:C.line}}>{d.inputs.map(([id,label,unit])=>(<label key={id} className="flex items-center justify-between gap-2 py-1.5"><span className="text-[13px]" style={{color:C.ink}}>{label}</span><span className="flex items-center gap-1"><input type="number" disabled={!editable} value={vals[id]} onChange={e=>setKpi(code,id,e.target.value===""?0:parseFloat(e.target.value))} className="w-24 text-right text-[13px] font-semibold rounded-md border px-2 py-1" style={{borderColor:C.line,...MONO,background:editable?"#fff":"#f8fafc"}}/><span className="text-[11px] w-10" style={{color:C.sub}}>{unit}</span></span></label>))}</div>
  </div>
  <div className="lg:col-span-3 grid sm:grid-cols-2 gap-3 content-start">{res.map((r,i)=><KpiCard key={i} r={r}/>)}</div>
 </div>);}
function KpiOverview({kpiVals,go}){const a=kpiAgg(kpiVals);const donut=[{value:a.g,color:KSTA["XANH"].dot},{value:a.y,color:KSTA["VÀNG"].dot},{value:a.r,color:KSTA["ĐỎ"].dot}];
 return(<div className="space-y-4">
  <div><Eyebrow>Chỉ số quản trị (KPI)</Eyebrow><h2 className="text-lg font-bold" style={{color:C.navy}}>Sức khỏe KPI 13 phòng ban</h2></div>
  <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">{[["Tổng KPI",a.g+a.y+a.r,C.navy2],["Xanh",a.g,KSTA["XANH"].c],["Vàng",a.y,KSTA["VÀNG"].c],["Đỏ",a.r,KSTA["ĐỎ"].c]].map((c,i)=>(<div key={i} className="bg-white rounded-xl border p-4" style={{borderColor:C.line}}><Eyebrow>{c[0]}</Eyebrow><div className="text-3xl font-extrabold mt-2" style={{color:c[2],...MONO}}>{c[1]}</div></div>))}</div>
  <div className="grid lg:grid-cols-5 gap-4">
   <div className="bg-white rounded-xl border p-4 lg:col-span-2" style={{borderColor:C.line}}><Eyebrow>Phân bố trạng thái KPI</Eyebrow><DonutG data={donut} sub="KPI"/></div>
   <div className="bg-white rounded-xl border p-4 lg:col-span-3" style={{borderColor:C.line}}><Eyebrow>Sức khỏe theo phòng ban — bấm để xem chi tiết</Eyebrow>
    <div className="space-y-1.5 mt-3">{a.per.map(p=>(<div key={p.code} onClick={()=>go(p.code)} className="flex items-center gap-2 cursor-pointer hover:bg-slate-50 rounded px-1 py-0.5"><div className="w-20 text-[11px] truncate" style={{color:C.ink}}>{p.short}</div><div className="flex-1 h-4 rounded overflow-hidden flex" style={{background:"#f1f5f9"}}>{p.cD>0&&<div style={{width:p.cD/(p.cD+p.cY+p.cG)*100+"%",background:KSTA["ĐỎ"].dot}}></div>}{p.cY>0&&<div style={{width:p.cY/(p.cD+p.cY+p.cG)*100+"%",background:KSTA["VÀNG"].dot}}></div>}{p.cG>0&&<div style={{width:p.cG/(p.cD+p.cY+p.cG)*100+"%",background:KSTA["XANH"].dot}}></div>}</div><KBadge s={p.overall}/></div>))}</div>
   </div>
  </div>
 </div>);}

/* ---- Projects (EVM) ---- */
function EvmChart({pv,ev,ac,eac,bac}){const W=360,H=190,pad=30,base=H-24,top=12;const max=Math.max(pv,ev,ac,eac,bac,1)*1.12;const bars=[["PV",pv,"#94a3b8"],["EV",ev,C.teal],["AC",ac,C.navy2],["EAC",eac,KSTA["VÀNG"].dot]];const bw=46,gap=(W-pad*2-bw*bars.length)/(bars.length-1);const yOf=v=>top+(1-v/max)*(base-top);const bacY=yOf(bac);
 return(<svg viewBox={"0 0 "+W+" "+H} className="w-full" style={{maxHeight:230}}>
  {[0,.25,.5,.75,1].map((f,i)=>{const yy=top+(1-f)*(base-top);return(<g key={i}><line x1={pad} y1={yy} x2={W-pad} y2={yy} stroke="#eef2f7"/><text x={pad-4} y={yy+3} textAnchor="end" style={{fontSize:8,fill:C.sub}}>{Math.round(max*f)}</text></g>);})}
  {bars.map(([n,val,col],i)=>{const x=pad+i*(bw+gap);const yy=yOf(val);return(<g key={i}><rect x={x} y={yy} width={bw} height={base-yy} rx="3" fill={col}/><text x={x+bw/2} y={yy-4} textAnchor="middle" style={{fontSize:10,fontWeight:700,fill:C.ink,...MONO}}>{fmtN(val)}</text><text x={x+bw/2} y={base+13} textAnchor="middle" style={{fontSize:11,fontWeight:600,fill:C.ink}}>{n}</text></g>);})}
  <line x1={pad} y1={bacY} x2={W-pad} y2={bacY} stroke={KSTA["ĐỎ"].c} strokeWidth="1.5" strokeDasharray="5 4"/><text x={W-pad} y={bacY-4} textAnchor="end" style={{fontSize:9,fontWeight:700,fill:KSTA["ĐỎ"].c}}>BAC {fmtN(bac)}</text></svg>);}
function ProjectsModule({projVals,setProj,editable}){const [sel,setSel]=useState(PROJECTS[0].code);const meta=PROJECTS.find(p=>p.code===sel);const vals=projVals[sel];const ext={...vals,...PRJ_DERIVE(vals)};
 const res=PRJ_KPIS.map(k=>{let v=k.calc(ext);if(!isFinite(v))v=0;return{...k,val:v,status:statusOf(v,k.good,k.bad,k.dir),score:scoreOf(v,k.good,k.bad,k.dir)};});
 const portfolio=PROJECTS.map(p=>{const e={...projVals[p.code],...PRJ_DERIVE(projVals[p.code])};const ks=PRJ_KPIS.map(k=>statusOf(k.calc(e),k.good,k.bad,k.dir));return{code:p.code,name:p.name,role:p.role,spi:projVals[p.code].ev/projVals[p.code].pv,cpi:projVals[p.code].ev/projVals[p.code].ac,overall:rollup(ks)};});
 return(<div className="space-y-4">
  <div><Eyebrow>Quản trị dự án (EVM)</Eyebrow><h2 className="text-lg font-bold" style={{color:C.navy}}>Danh mục dự án</h2></div>
  <div className="flex flex-wrap gap-2">{PROJECTS.map(p=><button key={p.code} onClick={()=>setSel(p.code)} style={p.code===sel?{background:C.teal,color:"#fff",borderColor:C.teal}:{borderColor:C.line,color:C.ink}} className="text-xs font-semibold rounded-full border bg-white px-3 py-1.5">{p.name}</button>)}</div>
  <div className="grid lg:grid-cols-5 gap-4">
   <div className="bg-white rounded-xl border p-4 lg:col-span-2" style={{borderColor:C.line}}>
    <Eyebrow>{meta.role}</Eyebrow><h3 className="font-bold mb-1" style={{color:C.navy}}>{meta.name}</h3>
    <div className="grid grid-cols-2 gap-x-3">{PRJ_INPUTS.map(([gid,gn,fs])=>fs.map(([id,label,unit])=>(<label key={id} className="flex items-center justify-between gap-1 py-1"><span className="text-[12px]" style={{color:C.ink}}>{label}</span><input type="number" disabled={!editable} value={vals[id]} onChange={e=>setProj(sel,id,e.target.value===""?0:parseFloat(e.target.value))} className="w-16 text-right text-[12px] font-semibold rounded border px-1 py-0.5" style={{borderColor:C.line,...MONO,background:editable?"#fff":"#f8fafc"}}/></label>)))}</div>
   </div>
   <div className="lg:col-span-3 space-y-3">
    <div className="bg-white rounded-xl border p-4" style={{borderColor:C.line}}><Eyebrow>Phân tích giá trị thực hiện (EVM)</Eyebrow><div className="mt-2"><EvmChart pv={vals.pv} ev={vals.ev} ac={vals.ac} eac={ext.eac} bac={vals.bac}/></div></div>
    <div className="grid sm:grid-cols-2 gap-2">{res.slice(0,6).map((r,i)=><KpiCard key={i} r={r}/>)}</div>
   </div>
  </div>
  <div className="bg-white rounded-xl border" style={{borderColor:C.line}}><div className="px-4 py-3 border-b" style={{borderColor:C.line}}><Eyebrow>Danh mục dự án</Eyebrow></div>
   <div className="overflow-x-auto"><table className="w-full text-sm"><thead><tr className="text-[11px] uppercase" style={{color:C.sub}}><th className="text-left font-semibold px-4 py-2">Dự án</th><th className="text-left font-semibold px-4 py-2">Vai trò</th><th className="text-right font-semibold px-4 py-2">SPI</th><th className="text-right font-semibold px-4 py-2">CPI</th><th className="text-center font-semibold px-4 py-2">Trạng thái</th></tr></thead>
    <tbody>{portfolio.map(p=>(<tr key={p.code} onClick={()=>setSel(p.code)} className="border-t cursor-pointer hover:bg-slate-50" style={{borderColor:C.line}}><td className="px-4 py-2 font-semibold" style={{color:C.ink}}>{p.name}</td><td className="px-4 py-2 text-[12px]" style={{color:C.sub}}>{p.role}</td><td className="px-4 py-2 text-right font-semibold mono" style={{color:p.spi<0.9?KSTA["ĐỎ"].c:p.spi<1?KSTA["VÀNG"].c:KSTA["XANH"].c}}>{p.spi.toFixed(2)}</td><td className="px-4 py-2 text-right font-semibold mono" style={{color:p.cpi<0.95?KSTA["ĐỎ"].c:p.cpi<1?KSTA["VÀNG"].c:KSTA["XANH"].c}}>{p.cpi.toFixed(2)}</td><td className="px-4 py-2 text-center"><KBadge s={p.overall}/></td></tr>))}</tbody></table></div>
  </div>
 </div>);}

/* ---- App shell ---- */
function App(){
 const [user,setUser]=useState(null);
 const [deptData,setDeptData]=useState(null);
 const [tab,setTab]=useState("overview");
 const [selDept,setSelDept]=useState(null);
 const [toastMsg,setToastMsg]=useState(null),[toastErr,setToastErr]=useState(false);
 const toast=(m,e)=>{setToastErr(!!e);setToastMsg(m);clearTimeout(window.__tt);window.__tt=setTimeout(()=>setToastMsg(null),3800);};
 const [kpiVals,setKpiVals]=useState(()=>{const o={};KPIDEPTS.forEach(d=>{o[d.code]={};d.inputs.forEach(([id,a,b,def])=>o[d.code][id]=def);});return o;});
 const [projVals,setProjVals]=useState(()=>{const o={};PROJECTS.forEach(p=>o[p.code]={...p.vals});return o;});
 const setKpi=(c,id,v)=>setKpiVals(s=>({...s,[c]:{...s[c],[id]:v}}));
 const setProj=(c,id,v)=>setProjVals(s=>({...s,[c]:{...s[c],[id]:v}}));

 useEffect(()=>{if(user&&!deptData)loadAll();},[user]);
 async function loadAll(){const data={};for(const d of DEPTS){let raw=await sget("wpr:dept:"+d.code);if(raw){try{data[d.code]=JSON.parse(raw);}catch(e){data[d.code]={code:d.code,tasks:[],updatedAt:0,updatedBy:""};}}else{const obj={code:d.code,tasks:(TASKS_DEFAULT[d.code]||[]).map((t,i)=>({id:"s"+d.code+i,muctieu:"",phutrach:"",phoihop:"",batdau:"",han:"",ketqua:"",khokhan:"",dexuat:"",...t})),updatedAt:Date.now(),updatedBy:"(dữ liệu mẫu)"};await sset("wpr:dept:"+d.code,JSON.stringify(obj));data[d.code]=obj;}}setDeptData(data);}
 async function saveDept(code,tasks){const obj={code,tasks,updatedAt:Date.now(),updatedBy:user.name};await sset("wpr:dept:"+code,JSON.stringify(obj));setDeptData(s=>({...s,[code]:obj}));}
 async function adminImport(code,tasks){await saveDept(code,tasks);}

 if(!user)return <Login onLogin={u=>{setUser(u);setTab(u.role==="admin"?"overview":"work");}}/>;
 if(!deptData)return <div className="min-h-screen flex items-center justify-center" style={{color:C.sub}}>Đang tải dữ liệu…</div>;

 const isAdmin=user.role==="admin";
 const tabs=isAdmin?[["overview","Tổng quan",IcGrid],["deptwork","Công việc phòng ban",IcList],["kpi","Chỉ số KPI",IcGauge],["projects","Dự án (EVM)",IcFolder]]
                   :[["work","Công việc của phòng",IcList],["mykpi","Chỉ số KPI phòng",IcGauge]];
 return(<div style={{background:C.page,minHeight:"100%"}}>
  <header style={{background:C.navy}} className="text-white">
   <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3">
    <div className="flex items-center justify-between gap-3 flex-wrap">
     <div><div className="text-[10px] tracking-[0.18em] uppercase" style={{color:"#9fb3d1"}}>CÔNG TY CỔ PHẦN ĐẦU TƯ THIÊN ÂN</div><h1 className="text-base sm:text-lg font-bold">Phần mềm Quản trị Công việc & Điều hành</h1></div>
     <div className="flex items-center gap-2 text-xs">
      <span className="hidden sm:inline px-2 py-1 rounded" style={{background:"rgba(255,255,255,0.08)",color:"#cbd5e1"}}>{STORAGE_LABEL}</span>
      <span className="px-2.5 py-1 rounded-md font-semibold" style={{background:"rgba(255,255,255,0.12)"}}>{isAdmin?"👑 ":"🏢 "}{user.name}</span>
      <button onClick={()=>{setUser(null);setDeptData(null);}} className="inline-flex items-center gap-1.5 rounded-md px-2.5 py-1.5 font-semibold bg-white/10 hover:bg-white/20">{IcOut} Thoát</button>
     </div>
    </div>
    <nav className="flex gap-1 mt-3 flex-wrap">{tabs.map(([id,lab,ic])=>(<button key={id} onClick={()=>setTab(id)} style={{background:tab===id?C.page:"transparent",color:tab===id?C.navy:"#cdd9ec"}} className={"inline-flex items-center gap-2 text-sm font-semibold rounded-t-lg px-4 py-2.5 "+(tab===id?"":"hover:bg-white/10")}>{ic}{lab}</button>))}</nav>
   </div>
  </header>
  <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6">
   {isAdmin&&tab==="overview"&&<CompanyOverview deptData={deptData} adminImport={adminImport} toast={toast} go={c=>{setSelDept(c);setTab("deptwork");}}/>}
   {isAdmin&&tab==="deptwork"&&(<div className="space-y-4"><div className="flex flex-wrap gap-2">{DEPTS.map(d=><button key={d.code} onClick={()=>setSelDept(d.code)} style={(selDept||DEPTS[0].code)===d.code?{background:C.navy2,color:"#fff",borderColor:C.navy2}:{borderColor:C.line,color:C.ink}} className="text-xs font-semibold rounded-full border bg-white px-3 py-1.5">{d.short}</button>)}</div><WorkPlanEditor code={selDept||DEPTS[0].code} deptData={deptData} saveDept={saveDept} toast={toast} readOnly={true}/></div>)}
   {isAdmin&&tab==="kpi"&&(selDept?<div className="space-y-3"><button onClick={()=>setSelDept(null)} className="text-sm font-semibold" style={{color:C.teal}}>← Quay lại tổng quan KPI</button><KpiDeptView code={selDept} kpiVals={kpiVals} setKpi={setKpi} editable={true}/></div>:<KpiOverview kpiVals={kpiVals} go={c=>setSelDept(c)}/>)}
   {isAdmin&&tab==="projects"&&<ProjectsModule projVals={projVals} setProj={setProj} editable={true}/>}
   {!isAdmin&&tab==="work"&&<WorkPlanEditor code={user.code} deptData={deptData} saveDept={saveDept} toast={toast} readOnly={false}/>}
   {!isAdmin&&tab==="mykpi"&&<KpiDeptView code={user.code} kpiVals={kpiVals} setKpi={setKpi} editable={true}/>}
   <footer className="mt-8 text-[11px]" style={{color:C.sub}}>Dữ liệu công việc được lưu ở: <b>{STORAGE_LABEL}</b>. Dữ liệu khởi tạo là mẫu — các phòng nhập/cập nhật để thay thế. KPI & Dự án là khu phân tích (theo phiên).</footer>
  </main>
  {toastMsg&&<div className="fixed left-1/2 bottom-5 -translate-x-1/2 z-50 text-sm font-semibold rounded-lg px-4 py-2.5 shadow-lg" style={{background:toastErr?"#7f1d1d":C.navy,color:"#fff",maxWidth:"90vw"}}>{toastMsg}</div>}
 </div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
